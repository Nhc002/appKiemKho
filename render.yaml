services:
  - type: web
      name: fabi-inventory-backend
          runtime: node
              region: singapore # Near Vietnam
                  plan: free
                      buildCommand: cd backend && npm install --production=false && npm run build
                          startCommand: cd backend && npm start
                              envVars:
                                    - key: NODE_ENV
                                            value: production
                                                  - key: PORT
                                                          value: "5000"
                                                                - key: SUPABASE_URL
                                                                        sync: false # Must input manually on Render dashboard
                                                                              - key: SUPABASE_SERVICE_ROLE_KEY
                                                                                      sync: false
                                                                                            - key: FRONTEND_URL
                                                                                                    sync: false # Frontend URL after deploy
                                                                                                          - key: FABI_BASE_URL
                                                                                                                  value: "https://posapi.ipos.vn"
                                                                                                                        - key: FABI_TOKEN
                                                                                                                                sync: false
                                                                                                                                      - key: FABI_COMPANY_UID
                                                                                                                                              sync: false
                                                                                                                                                    - key: FABI_BRAND_UID
                                                                                                                                                            sync: false
                                                                                                                                                                  - key: FABI_STORE_UID
                                                                                                                                                                          sync: false
                                                                                                                                                                              healthCheckPath: /health
                                                                                                                                                                                  autoDeploy: true # Auto deploy on push
